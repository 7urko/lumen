name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Core unit tests
        run: npm test -w @lumen/core
      - name: Type-check web
        run: npm run typecheck -w web
      - name: Build web
        run: npm run build -w web
