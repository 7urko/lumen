<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06060b" />
  <title>Lumen — Web Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="web.css" />

  <!-- Synchronously pull the canonical markup from index.html so the web build can
       never drift from the app's DOM (app.js binds to those exact IDs). -->
  <script>
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "index.html", false); // sync: must finish before parsing continues
        xhr.send();
        window.__LUMEN_INDEX_HTML = xhr.responseText;
      } catch (e) {
        window.__LUMEN_INDEX_HTML = "";
        window.__LUMEN_BOOT_ERR = e;
      }
    })();
  </script>
</head>
<body>
  <!-- Assemble the desktop shell during initial parse (before DOMContentLoaded), so
       app.js's DOMContentLoaded boot runs against a fully-present DOM. -->
  <script>
    (function () {
      var src = window.__LUMEN_INDEX_HTML || "";
      if (!src) {
        document.body.innerHTML =
          '<div style="max-width:520px;margin:18vh auto;padding:28px;font-family:Inter,system-ui,sans-serif;' +
          'color:#f3f5fc;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:18px;text-align:center">' +
          '<h2 style="font-family:\'Space Grotesk\',sans-serif;margin-bottom:10px">Open the web build over a server</h2>' +
          '<p style="color:#9aa3c2;line-height:1.6">web.html loads <code>index.html</code> at runtime, which browsers block on <code>file://</code>. ' +
          'Serve the folder (e.g. the included <code>_serve.ps1</code> on <code>http://localhost:8123</code>) and open ' +
          '<code>/web.html</code> there.</p></div>';
        return;
      }

      var parsed = new DOMParser().parseFromString(src, "text/html");
      var app = parsed.querySelector("#app");
      var bg = parsed.querySelector(".bg");
      if (!app) { document.body.textContent = "Could not read app markup from index.html."; return; }

      // animated background first (sits behind everything via z-index)
      if (bg) document.body.appendChild(document.importNode(bg, true));

      var appNode = document.importNode(app, true);
      var screenMain = appNode.querySelector("#screen-main");

      if (screenMain) {
        // build the desktop sidebar
        var ICONS = {
          home: '<path d="M3 10.5 12 3l9 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 9.5V20h13V9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
          send: '<path d="M7 17 17 7M9 7h8v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
          receive: '<path d="M17 7 7 17M15 17H7V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
          buy: '<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
          swap: '<path d="M4 8h13l-3.5-3.5M20 16H7l3.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
          activity: '<path d="M3 12h4l2.5 6 5-12L17 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
          markets: '<path d="M5 4v15a1 1 0 0 0 1 1h15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 14l3.5-4 3 2.5L20 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
          insights: '<path d="M12 3a9 9 0 1 0 9 9h-9V3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 3.2A9 9 0 0 1 20.8 10H14V3.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>',
          copilot: '<path d="M12 3c1 2 2 3 4 4-2 1-3 2-4 4-1-2-2-3-4-4 2-1 3-2 4-4Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M18.5 13.5c.5 1 1 1.5 2 2-1 .5-1.5 1-2 2-.5-1-1-1.5-2-2 1-.5 1.5-1 2-2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>',
          earn: '<path d="M12 21c4.4 0 8-3.1 8-7s-3.6-7-8-7-8 3.1-8 7 3.6 7 8 7Z" stroke="currentColor" stroke-width="1.7"/><path d="M12 11v3M12 3v2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>',
          alerts: '<path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>',
          contacts: '<path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8"/><path d="M5 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
          security: '<path d="M12 3l7 3v5c0 4.4-3 8-7 10-4-2-7-5.6-7-10V6l7-3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
        };
        var LINKS = [
          ["group", "Wallet"],
          ["dashboard", "home", "Home"],
          ["send", "send", "Send"],
          ["receive", "receive", "Receive"],
          ["buy", "buy", "Buy"],
          ["swap", "swap", "Swap"],
          ["history", "activity", "Activity"],
          ["group", "Explore"],
          ["chart", "markets", "Markets"],
          ["insights", "insights", "Insights"],
          ["copilot", "copilot", "Copilot"],
          ["earn", "earn", "Earn"],
          ["alerts", "alerts", "Alerts"],
          ["contacts", "contacts", "Contacts"],
          ["recovery", "security", "Security"]
        ];
        var navHtml = "";
        LINKS.forEach(function (l) {
          if (l[0] === "group") { navHtml += '<span class="sb-group">' + l[1] + '</span>'; return; }
          navHtml += '<button class="nav-btn sb-link" data-nav="' + l[0] + '">' +
            '<svg viewBox="0 0 24 24" fill="none">' + ICONS[l[1]] + '</svg><span>' + l[2] + '</span></button>';
        });

        var sidebar = document.createElement("aside");
        sidebar.className = "web-sidebar";
        sidebar.innerHTML =
          '<div class="sb-brand">' +
            '<div class="brand-mark sm"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="m12 7-4.5 5L12 17l4.5-5L12 7Z" fill="currentColor"/></svg></div>' +
            '<div class="sb-brand-text"><span class="sb-name">Lumen</span><span class="sb-tag">Web</span></div>' +
          '</div>' +
          '<nav class="sb-nav">' + navHtml + '</nav>' +
          '<div class="sb-foot"><span class="sb-demo">Demo · mock data · no real funds</span></div>';

        var content = document.createElement("div");
        content.className = "web-content";
        while (screenMain.firstChild) content.appendChild(screenMain.firstChild);
        screenMain.appendChild(sidebar);
        screenMain.appendChild(content);
      }

      document.body.appendChild(appNode);
    })();
  </script>

  <!-- Same external libs index.html uses; loaded here so app.js can see them. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <!-- app.js registers its DOMContentLoaded boot now, while the DOM above is already in place. -->
  <script src="app.js"></script>
</body>
</html>
